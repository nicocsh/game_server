services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
    networks:
      - web

  db:
    image: postgres:18
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=game_server_dev
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d game_server_dev"]
    ports:
      - "5432:5432"
    networks:
      - web

  app:
    build: .
    # Enable this to set custom env values
    #env_file:
    #  - .env
    environment:
      # Run mix phx.gen.secret
      SECRET_KEY_BASE: 1DdaMAX56nUh1tvXniEEuQNsGNvgADndawxrJ3YFZlLXc9EOahC/NFDgowCDUFwb
      # Path to server module plugins
      GAME_SERVER_PLUGINS_DIR: modules/plugins_examples
      DEVICE_AUTH_ENABLED: true
      PHX_HOST: localhost
      # Disable this in prod
      MAILBOX_PREVIEW_ENABLED: true
      # Postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: game_server_dev
      # Cache
      CACHE_MODE: multi
      CACHE_L2: redis
      CACHE_REDIS_URL: redis://redis:6379/0
      # Shared rate limiting across app instances
      RATE_LIMIT_BACKEND: redis
      # ── HTTPS (uncomment to enable) ──
      # SSL_CERTFILE: /etc/letsencrypt/live/${PHX_HOST:-localhost}/fullchain.pem
      # SSL_KEYFILE: /etc/letsencrypt/live/${PHX_HOST:-localhost}/privkey.pem
      # FORCE_SSL: "true"
      # ACME_WEBROOT: /var/www/acme
      # ── GeoIP (country lookup from IP) ──
      GEOIP_DB_PATH: /app/data/GeoLite2-Country.mmdb
    volumes:
      - ./modules:/app/modules
      - ./priv/static/images:/app/priv/static/images
      - ./priv/static/theme.css:/app/priv/static/theme.css
      - ./data:/app/data:ro
      # Uncomment for HTTPS — mount Let's Encrypt certs and ACME webroot
      # - ./certbot/conf:/etc/letsencrypt:ro
      # - ./certbot/www:/var/www/acme:ro
    depends_on:
      - db
      - redis
    networks:
      - web
    # NOTE: we don't map host ports directly here so we can safely scale multiple replicas.
    # Expose the internal port so the nginx proxy can talk to the instances.
    expose:
      - "4000"

  nginx:
    image: nginx:stable-alpine
    ports:
      - "4000:80" # Expose to host at port 4000
    depends_on:
      - app
    volumes:
      - ./nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - web

  # ── Observability (Prometheus + Grafana) ──
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - app
    networks:
      - web

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - web

volumes:
  pgdata:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  web:
    driver: bridge
